specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Traceable
providerId: traceable
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - API Security
  - API Discovery
  - API Protection
  - Rate Limiting
description: Traceable's documented surface is the protection it provides for the customer's APIs, not
  a published rate-limit document for its own management API. Tenant-level capacity and ingestion limits
  are part of the commercial agreement.
sources:
  - https://www.traceable.ai/
notes: Traceable does not publish a developer rate-limit page; no public limits to reconcile.
limits:
  - name: Traceable management / ingestion API limits
    scope: tenant
    metric: varies
    limit: not publicly published; defined in customer contract
policies:
  - name: Tenant-Scoped Capacity
    description: Ingestion volume (transactions/minute, agent count, retention) and management-API throughput
      are sized per customer; consult the Traceable account team for tenant-specific values.
maintainers:
