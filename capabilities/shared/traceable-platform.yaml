naftiko: "1.0.0-alpha1"

info:
  label: "Traceable Platform API"
  description: "Traceable API security platform providing GraphQL queries for API discovery analytics, vulnerability management, threat activity monitoring, and API security test configuration."
  tags:
    - API Discovery
    - API Security
    - GraphQL
    - Observability
    - Threat Detection
    - Vulnerability Management
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TRACEABLE_API_TOKEN: TRACEABLE_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: traceable-platform
      baseUri: https://api.traceable.ai
      description: "Traceable platform API for API security analytics and management"
      authentication:
        type: bearer
        token: "{{TRACEABLE_API_TOKEN}}"
      resources:
        - name: graphql
          path: /graphql
          description: "GraphQL query interface"
          operations:
            - name: execute-graphql-query
              method: POST
              description: "Execute a GraphQL query against the Traceable platform"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  variables: "{{tools.variables}}"
        - name: specifications
          path: /rest/download
          description: "API specification download"
          operations:
            - name: download-api-spec
              method: GET
              description: "Download discovered API specification"
              inputParameters:
                - name: format
                  in: query
                  type: string
                  required: false
                  description: "Specification format"
                - name: service
                  in: query
                  type: string
                  required: false
                  description: "Filter by service name"
                - name: domain
                  in: query
                  type: string
                  required: false
                  description: "Filter by domain"
                - name: environment
                  in: query
                  type: string
                  required: false
                  description: "Filter by environment"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: mcp
          path: /mcp
          description: "MCP tool execution"
          operations:
            - name: execute-mcp-tool
              method: POST
              description: "Execute an MCP tool"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  tool: "{{tools.tool_name}}"
                  parameters: "{{tools.parameters}}"

  exposes:
    - type: rest
      port: 8100
      namespace: traceable-platform-api
      resources:
        - path: /v1/graphql
          name: graphql
          description: "GraphQL query interface"
          operations:
            - method: POST
              name: execute-graphql-query
              description: "Execute GraphQL query"
              call: "traceable-platform.execute-graphql-query"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: traceable-platform-mcp
      transport: http
      tools:
        - name: execute-graphql-query
          description: "Execute a GraphQL query against Traceable platform"
          hints:
            readOnly: true
            openWorld: false
          call: "traceable-platform.execute-graphql-query"
          with:
            query: "tools.query"
            variables: "tools.variables"
          outputParameters:
            - type: object
              mapping: "$."
