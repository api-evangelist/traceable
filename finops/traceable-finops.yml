specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Traceable
providerId: traceable
publisherName: Harness, Inc.
serviceCategory: API Security
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - API Security
  - API Discovery
  - API Protection
  - FinOps
  - FOCUS
description: 'FinOps shape for Traceable: contracted enterprise subscription for the API security platform,
  typically scaled by transactions ingested, agent/sensor count, modules enabled, and retention. No public
  meter rates are published; this artifact captures structural meters.'
sources:
  - https://www.traceable.ai/pricing
notes: Pricing not publicly retrievable; meters are descriptive and unpriced. PublisherName reflects Traceable's
  acquisition by Harness in 2025.
billingModel:
  pricingCategory: Contracted Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
    - Refund
focusColumns:
  ServiceName: Traceable
  ServiceCategory: API Security
  ProviderName: Traceable
  PublisherName: Harness, Inc.
  InvoiceIssuerName: Harness, Inc.
  BillingCurrency: USD
meters:
  - name: api_transactions_ingested
    description: Volume of API transactions captured by Traceable agents/sensors and analyzed by the platform.
    unit: transaction
    aggregation: sum
    dimensions:
      - environment
      - service
  - name: agents_deployed
    description: Number of in-line / out-of-band Traceable agents (sensor licenses) deployed.
    unit: agent-month
    aggregation: avg
    dimensions:
      - cluster
      - environment
  - name: data_retention
    description: Retention window contracted for transaction telemetry (e.g., 30 / 90 days).
    unit: day
    aggregation: max
    dimensions:
      - module
principles:
  - name: Visibility
    description: Pull contract usage from the Traceable customer-success report (transactions ingested,
      agent count vs. cap); reconcile against your annual subscription tier each quarter.
  - name: Allocation
    description: Tag agents and ingested traffic with the owning microservice / business unit so the security
      cost is attributable to the API teams generating it.
  - name: Optimization
    description: Tune sampling and retention by environment (full retention for prod, reduced for non-prod);
      retire idle agents and prune orphaned API discoveries before each renewal.
  - name: Accountability
    description: AppSec or Platform Security team owns the Traceable contract and policy; engineering
      service owners are accountable for fixing the discoveries it surfaces.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
